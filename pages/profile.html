<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mi Perfil | Quinta Ola</title>
    <link href="/src/style.css" rel="stylesheet" />
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-gray-50 text-gray-800 font-sans min-h-screen flex flex-col pt-20">

    <nav class="bg-white/90 backdrop-blur-md shadow-sm px-8 py-3 flex justify-between items-center fixed top-0 left-0 w-full z-50">
        <div class="flex items-center">
            <a href="/pages/dashboard.html">
                <img src="../img/QuintaOlaLogo.png" alt="Quinta Ola Logo" class="h-14 w-auto object-contain" />
            </a>
        </div>

        <div class="hidden md:flex gap-6 text-sm items-center">
            <a href="/pages/dashboard.html" class="relative text-secondary hover:text-accent transition font-medium group">
                Dashboard
                <span class="absolute left-0 -bottom-1 w-0 h-[2px] bg-accent transition-all duration-300 group-hover:w-full"></span>
            </a>
            <a href="/pages/inventory.html" class="relative text-secondary hover:text-accent transition font-medium group">
                Inventario
                <span class="absolute left-0 -bottom-1 w-0 h-[2px] bg-accent transition-all duration-300 group-hover:w-full"></span>
            </a>
            <a href="/pages/transactions.html" class="relative text-secondary hover:text-accent transition font-medium group">
                Transacciones
                <span class="absolute left-0 -bottom-1 w-0 h-[2px] bg-accent transition-all duration-300 group-hover:w-full"></span>
            </a>
            
            <div class="ml-4 flex items-center gap-3 pl-4 border-l border-gray-200">
                <a href="/pages/profile.html" class="h-10 w-10 rounded-full bg-accent text-white flex items-center justify-center shadow-md border border-accent/20">
                    <i data-lucide="user" class="w-5 h-5"></i>
                </a>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-4xl mx-auto px-6 py-10 w-full">
        
        <div class="flex flex-col md:flex-row gap-8">
            
            <div class="md:w-1/3 space-y-6">
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8 text-center relative">
                    <div class="relative w-32 h-32 mx-auto mb-4">
                        <div class="w-full h-full rounded-full bg-accent/10 flex items-center justify-center text-accent text-4xl font-bold border-4 border-white shadow-md overflow-hidden">
                            <span id="userInitials">AG</span>
                        </div>
                        <label for="avatar-upload" class="absolute bottom-0 right-0 bg-white p-2 rounded-full shadow-lg border border-gray-100 cursor-pointer hover:text-accent transition-colors">
                            <i data-lucide="camera" class="w-5 h-5"></i>
                            <input type="file" id="avatar-upload" class="hidden" accept="image/*" />
                        </label>
                    </div>
                    
                    <h2 class="text-xl font-bold text-gray-900">Alvaro Gómez</h2>
                    <p class="text-gray-500 text-sm mb-6">alvaro@email.com</p>
                    
                    <div class="pt-6 border-t border-gray-100">
                        <a href="/login.html" class="flex items-center justify-center gap-2 w-full py-3 px-4 rounded-xl text-red-500 bg-red-50 hover:bg-red-100 transition-colors font-medium text-sm">
                            <i data-lucide="log-out" class="w-4 h-4"></i>
                            Cerrar Sesión
                        </a>
                    </div>
                </div>

                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
                    <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-4">Estado del Perfil</h3>
                    <div class="flex items-center gap-3">
                        <div class="h-2.5 w-2.5 rounded-full bg-green-500"></div>
                        <span class="text-sm font-medium text-gray-700">Cuenta Activa</span>
                    </div>
                </div>
            </div>

            <div class="md:w-2/3 space-y-6">
                
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                    <div class="px-8 py-5 border-b border-gray-100 flex items-center justify-between">
                        <h3 class="font-bold text-gray-900 flex items-center gap-2">
                            <i data-lucide="user-cog" class="w-5 h-5 text-accent"></i>
                            Información Personal
                        </h3>
                        <span class="px-3 py-1 text-[11px] font-bold rounded-full bg-blue-100 text-blue-700 uppercase">Manager</span>
                    </div>
                    
                    <div class="p-8">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-6">
                            <div class="space-y-1">
                                <label class="text-[11px] font-bold text-gray-400 uppercase">Nombre</label>
                                <p class="text-sm font-semibold text-gray-800 border-b border-gray-50 pb-2">Alvaro</p>
                            </div>
                            <div class="space-y-1">
                                <label class="text-[11px] font-bold text-gray-400 uppercase">Apellido</label>
                                <p class="text-sm font-semibold text-gray-800 border-b border-gray-50 pb-2">Gómez</p>
                            </div>
                            <div class="md:col-span-2 space-y-1">
                                <label class="text-[11px] font-bold text-gray-400 uppercase">Correo Electrónico</label>
                                <p class="text-sm font-semibold text-gray-800 border-b border-gray-50 pb-2">alvaro@email.com</p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                    <div class="px-8 py-5 border-b border-gray-100">
                        <h3 class="font-bold text-gray-900 flex items-center gap-2">
                            <i data-lucide="lock" class="w-5 h-5 text-accent"></i>
                            Seguridad
                        </h3>
                    </div>
                    
                    <form class="p-8 space-y-5">
                        <div>
                            <label class="block text-[11px] font-bold text-gray-400 uppercase mb-2">Contraseña actual</label>
                            <input type="password" placeholder="••••••••"
                                class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-accent/20 focus:border-accent transition-all text-sm" />
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-[11px] font-bold text-gray-400 uppercase mb-2">Nueva contraseña</label>
                                <input type="password" placeholder="Mín. 8 caracteres"
                                    class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-accent/20 focus:border-accent transition-all text-sm" />
                            </div>
                            <div>
                                <label class="block text-[11px] font-bold text-gray-400 uppercase mb-2">Confirmar nueva contraseña</label>
                                <input type="password" placeholder="Repite la contraseña"
                                    class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-accent/20 focus:border-accent transition-all text-sm" />
                            </div>
                        </div>

                        <button type="submit" class="w-full bg-accent text-white py-3 rounded-xl font-bold hover:bg-accent-dark transition-all shadow-md shadow-accent/20 active:scale-[0.98] mt-2">
                            Actualizar Contraseña
                        </button>
                    </form>
                </div>

            </div>
        </div>
    </main>

    <footer class="bg-gray-950 text-gray-500 py-8 mt-auto border-t border-gray-800">
        <div class="max-w-4xl mx-auto px-6 text-center text-[10px] uppercase tracking-widest">
            © 2026 Quinta Ola • Sistema de Gestión
        </div>
    </footer>

    <script>
        // Inicializar iconos de Lucide
        lucide.createIcons();

        // Lógica simple para previsualizar la foto (opcional para el front)
        document.getElementById('avatar-upload').addEventListener('change', function(e) {
            if (e.target.files && e.target.files[0]) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const avatarContainer = document.querySelector('.rounded-full.bg-accent\\/10');
                    avatarContainer.innerHTML = `<img src="${event.target.result}" class="w-full h-full object-cover">`;
                };
                reader.readAsDataURL(e.target.files[0]);
            }
        });
    </script>
</body>

</html>
