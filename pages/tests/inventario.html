<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inventario</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex">

    <!-- SIDEBAR -->
    <aside class="w-64 bg-white shadow-md p-5 space-y-6">

        <h1 class="text-xl font-bold text-gray-800">Inventory System</h1>

        <nav class="flex flex-col space-y-3 text-gray-700">
            <a href="#" class="p-2 hover:bg-gray-100 rounded">Dashboard</a>
            <a href="#" class="p-2 bg-gray-100 rounded font-semibold">Inventario</a>
            <a href="#" class="p-2 hover:bg-gray-100 rounded">Transacciones</a>
            <a href="#" class="p-2 hover:bg-gray-100 rounded">Historial</a>
            <a href="#" class="p-2 hover:bg-gray-100 rounded">Análisis</a>
        </nav>

    </aside>

    <!-- MAIN -->
    <main class="flex-1 p-8 space-y-6">

        <!-- HEADER -->
        <header class="flex justify-between items-center">
            <h2 class="text-2xl font-semibold text-gray-800">
                Inventario
            </h2>

            <button class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">
                + Nuevo Ítem
            </button>
        </header>

        <!-- FILTER BAR -->
        <section class="bg-white p-4 rounded shadow flex gap-4 flex-wrap">

            <input type="text" placeholder="Buscar ítem..." class="border p-2 rounded w-full md:w-1/3" />

            <select class="border p-2 rounded">
                <option>Todos los estados</option>
                <option>OK</option>
                <option>Bajo stock</option>
                <option>No disponible</option>
            </select>

            <select class="border p-2 rounded">
                <option>Todas las categorías</option>
            </select>

        </section>

        <!-- TABLE -->
        <section class="bg-white p-4 rounded shadow overflow-x-auto">

            <table class="w-full text-left text-sm">

                <thead class="border-b">
                    <tr class="text-gray-600">
                        <th class="p-3">Ítem</th>
                        <th class="p-3">Categoría</th>
                        <th class="p-3">Cantidad</th>
                        <th class="p-3">Estado</th>
                        <th class="p-3">Acciones</th>
                    </tr>
                </thead>

                <tbody>

                    <tr class="border-b">
                        <td class="p-3">Teclado</td>
                        <td class="p-3">Electrónica</td>
                        <td class="p-3">12</td>
                        <td class="p-3 text-green-600">OK</td>
                        <td class="p-3 space-x-2">
                            <button class="text-blue-500">Editar</button>
                            <button class="text-red-500">Eliminar</button>
                        </td>
                    </tr>

                    <tr class="border-b">
                        <td class="p-3">Mouse</td>
                        <td class="p-3">Electrónica</td>
                        <td class="p-3">3</td>
                        <td class="p-3 text-yellow-600">Bajo stock</td>
                        <td class="p-3 space-x-2">
                            <button class="text-blue-500">Editar</button>
                            <button class="text-red-500">Eliminar</button>
                        </td>
                    </tr>

                </tbody>

            </table>

        </section>

    </main>

</body>

</html>
