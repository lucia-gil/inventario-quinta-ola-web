<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nueva Transacción</title>
    <link href="/src/style.css" rel="stylesheet" />
</head>

<body class="bg-gray-100 font-sans">

    <!-- NAV -->
    <div class="flex gap-6 bg-white p-4 shadow mb-6 justify-center">
        <a href="/pages/dashboard.html">Dashboard</a>
        <a href="/pages/transactions.html">Transacciones</a>
        <a href="/pages/profile.html">Perfil</a>
    </div>

    <!-- FORM -->
    <div class="max-w-xl mx-auto bg-white p-6 rounded-xl shadow">

        <h2 class="text-xl font-semibold text-gray-700 mb-4">
            ➕ Nueva Transacción
        </h2>

        <form class="space-y-4">

            <div>
                <label class="text-sm text-gray-500">ID</label>
                <input type="text" class="w-full border rounded-lg px-3 py-2" placeholder="TXN-0001">
            </div>

            <div>
                <label class="text-sm text-gray-500">Solicitante</label>
                <input type="text" class="w-full border rounded-lg px-3 py-2">
            </div>

            <div>
                <label class="text-sm text-gray-500">Material</label>
                <input type="text" class="w-full border rounded-lg px-3 py-2">
            </div>

            <div>
                <label class="text-sm text-gray-500">Cantidad</label>
                <input type="number" class="w-full border rounded-lg px-3 py-2">
            </div>

            <div>
                <label class="text-sm text-gray-500">Tipo</label>
                <select class="w-full border rounded-lg px-3 py-2">
                    <option>Entrada</option>
                    <option>Salida</option>
                </select>
            </div>

            <button class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700">
                Registrar
            </button>

        </form>

    </div>

</body>
</html>
