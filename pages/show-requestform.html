<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nueva Transacción | Quinta Ola</title>
    <link href="/src/style.css" rel="stylesheet" />
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-gray-50 text-gray-800 font-sans min-h-screen flex flex-col pt-20">

    <nav class="bg-white/90 backdrop-blur-md shadow-sm px-8 py-3 flex justify-between items-center fixed top-0 left-0 w-full z-50">
        <div class="flex items-center">
            <a href="/pages/home.html">
                <img src="../img/QuintaOlaLogo.png" alt="Quinta Ola Logo" class="h-14 w-auto object-contain" />
            </a>
        </div>

        <div class="hidden md:flex gap-6 text-sm items-center">
            <a href="/pages/dashboard.html" class="relative text-secondary hover:text-accent transition font-medium group">
                Dashboard
                <span class="absolute left-0 -bottom-1 w-0 h-[2px] bg-accent transition-all duration-300 group-hover:w-full"></span>
            </a>

            <a href="/pages/transactions.html" class="relative text-secondary hover:text-accent transition font-medium group">
                Transacciones Actuales
                <span class="absolute left-0 -bottom-1 w-full h-[2px] bg-accent transition-all duration-300"></span>
            </a>

            <a href="/pages/inventory.html" class="relative text-secondary hover:text-accent transition font-medium group">
                Inventario
                <span class="absolute left-0 -bottom-1 w-0 h-[2px] bg-accent transition-all duration-300 group-hover:w-full"></span>
            </a>

            <a href="/pages/history.html" class="relative text-secondary hover:text-accent transition font-medium group">
                Historial
                <span class="absolute left-0 -bottom-1 w-0 h-[2px] bg-accent transition-all duration-300 group-hover:w-full"></span>
            </a>

            <div class="ml-4 flex items-center gap-3 pl-4 border-l border-gray-200">
                <div class="text-right hidden lg:block">
                    <p class="text-sm font-semibold text-gray-700 leading-none">Alvaro Gómez</p>
                    <p class="text-[11px] text-gray-500 mt-1">Administrador</p>
                </div>
                <a href="/pages/profile.html" class="h-10 w-10 rounded-full bg-accent/10 flex items-center justify-center text-accent">
                    <i data-lucide="user" class="w-5 h-5"></i>
                </a>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-4xl mx-auto px-6 py-10 w-full space-y-6">
        
        <div class="flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-bold text-secondary">Nueva Transacción</h1>
                <p class="text-sm text-gray-500 mt-1">Registra un nuevo movimiento de entrada o salida de material.</p>
            </div>
            <button onclick="window.history.back()" class="bg-white border border-gray-200 text-gray-700 hover:bg-gray-50 px-4 py-2.5 rounded-xl text-sm font-semibold transition-all shadow-sm flex items-center gap-2">
                <i data-lucide="arrow-left" class="w-4 h-4"></i> Volver
            </button>
        </div>

        <div class="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-gray-100">
            <form action="#" method="POST" class="space-y-6">

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label for="id_transaccion" class="block text-sm font-semibold text-gray-700 mb-2">ID Transacción</label>
                        <input type="text" id="id_transaccion" name="id_transaccion" 
                            class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-accent/20 focus:border-accent transition-all" 
                            placeholder="Ej. TXN-0001">
                    </div>

                    <div>
                        <label for="solicitante" class="block text-sm font-semibold text-gray-700 mb-2">Solicitante</label>
                        <div class="relative">
                            <i data-lucide="user" class="w-5 h-5 absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                            <input type="text" id="solicitante" name="solicitante" 
                                class="w-full pl-10 pr-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-accent/20 focus:border-accent transition-all" 
                                placeholder="Nombre del solicitante">
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label for="material" class="block text-sm font-semibold text-gray-700 mb-2">Material</label>
                        <div class="relative">
                            <i data-lucide="box" class="w-5 h-5 absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                            <input type="text" id="material" name="material" 
                                class="w-full pl-10 pr-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-accent/20 focus:border-accent transition-all" 
                                placeholder="Nombre o código del material">
                        </div>
                    </div>

                    <div>
                        <label for="cantidad" class="block text-sm font-semibold text-gray-700 mb-2">Cantidad</label>
                        <input type="number" id="cantidad" name="cantidad" min="1" 
                            class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-accent/20 focus:border-accent transition-all" 
                            placeholder="0">
                    </div>
                </div>

                <div>
                    <label for="tipo" class="block text-sm font-semibold text-gray-700 mb-2">Tipo de Movimiento</label>
                    <select id="tipo" name="tipo" 
                        class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-accent/20 focus:border-accent transition-all text-gray-600">
                        <option value="" disabled selected>Selecciona el tipo...</option>
                        <option value="entrada">Entrada (+)</option>
                        <option value="salida">Salida (-)</option>
                    </select>
                </div>

                <hr class="border-gray-100">

                <div class="flex justify-end gap-3 pt-2">
                    <button type="button" onclick="window.history.back()" 
                        class="px-5 py-2.5 bg-white border border-gray-200 rounded-xl text-sm font-semibold text-gray-700 hover:bg-gray-50 transition-all">
                        Cancelar
                    </button>
                    <button type="submit" 
                        class="bg-accent hover:bg-pink-600 text-white px-6 py-2.5 rounded-xl font-semibold text-sm transition-all shadow-sm flex items-center gap-2">
                        <i data-lucide="check-circle" class="w-4 h-4"></i> Registrar Transacción
                    </button>
                </div>

            </form>
        </div>
    </main>

    <script>
        // Inicializar iconos de Lucide
        lucide.createIcons();
    </script>
</body>

</html>
