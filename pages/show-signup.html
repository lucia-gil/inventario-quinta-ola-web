<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inventory System</title>
    <link href="/src/style.css" rel="stylesheet" />
</head>

<body class="bg-gray-100 font-sans">
    <div id="content">
        <!-- ---------------------------------------------------------------------- -->
        <div class="min-h-screen flex items-center justify-center bg-gray-50">
            <div class="w-full max-w-md bg-white p-8 rounded-lg shadow relative">
                <!-- Top Center Icon -->
                <div class="absolute -top-10 left-1/2 -translate-x-1/2 block">
                    <div
                        class="w-20 h-20 rounded-full bg-blue-600 flex items-center justify-center text-white text-2xl font-bold shadow">
                        ✨
                    </div>
                </div>

                <h2 class="text-2xl font-semibold text-gray-800 mb-6 text-center mt-8">
                    Create Account
                </h2>

                <form class="space-y-4">
                    <div>
                        <label class="text-sm text-gray-600">Name</label>
                        <input type="text"
                            class="w-full mt-1 px-3 py-2 border rounded-md block focus:outline-none focus:ring-2 focus:ring-green-500"
                            placeholder="Your name" />
                    </div>

                    <div>
                        <label class="text-sm text-gray-600">Email</label>
                        <input type="email"
                            class="w-full mt-1 px-3 py-2 border rounded-md block focus:outline-none focus:ring-2 focus:ring-green-500"
                            placeholder="you@example.com" />
                    </div>

                    <div>
                        <label class="text-sm text-gray-600">Password</label>
                        <input type="password"
                            class="w-full mt-1 px-3 py-2 border rounded-md block focus:outline-none focus:ring-2 focus:ring-green-500"
                            placeholder="••••••••" />
                    </div>

                    <div>
                        <label class="text-sm text-gray-600">Confirm Password</label>
                        <input type="password"
                            class="w-full mt-1 px-3 py-2 border rounded-md block focus:outline-none focus:ring-2 focus:ring-green-500"
                            placeholder="••••••••" />
                    </div>

                    <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-md hover:bg-blue-700 block">
                        Create Account
                    </button>
                </form>

                <p class="text-sm text-gray-600 text-center mt-4">
                    Already have an account?
                    <a href="/pages/show-login.html" class="text-blue-600 hover:underline">Login</a>
                </p>
            </div>
        </div>

        <!-- ---------------------------------------------------------------------- -->
    </div>
</body>

</html>
