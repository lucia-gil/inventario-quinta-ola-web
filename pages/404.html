<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Ups! Perdido en la Ola | 404</title>
    <link href="/src/style.css" rel="stylesheet" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Animación de las olas en el fondo del juego */
        .ocean {
            height: 80px;
            width: 100%;
            position: absolute;
            bottom: 0;
            left: 0;
            background: #0ea5e9;
            border-bottom-left-radius: 1rem;
            border-bottom-right-radius: 1rem;
            overflow: hidden;
            z-index: 1;
        }
        .wave {
            background: url('data:image/svg+xml;utf8,<svg viewBox="0 0 1440 320" xmlns="http://www.w3.org/2000/svg"><path fill="%2338bdf8" fill-opacity="1" d="M0,160L48,170.7C96,181,192,203,288,192C384,181,480,139,576,144C672,149,768,203,864,202.7C960,203,1056,149,1152,138.7C1248,128,1344,160,1392,176L1440,192L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>') repeat-x;
            background-size: 1000px 100px;
            position: absolute;
            width: 200%;
            height: 100px;
            bottom: 0;
            animation: wave-animation 4s linear infinite;
        }
        .wave2 {
            background: url('data:image/svg+xml;utf8,<svg viewBox="0 0 1440 320" xmlns="http://www.w3.org/2000/svg"><path fill="%230284c7" fill-opacity="0.5" d="M0,192L48,181.3C96,171,192,149,288,165.3C384,181,480,235,576,245.3C672,256,768,224,864,197.3C960,171,1056,149,1152,160C1248,171,1344,213,1392,234.7L1440,256L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>') repeat-x;
            background-size: 1000px 100px;
            position: absolute;
            width: 200%;
            height: 100px;
            bottom: 0;
            animation: wave-animation 6s linear infinite reverse;
        }
        @keyframes wave-animation {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        
        #gameCanvas {
            touch-action: none;
            z-index: 10;
            position: relative;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col items-center justify-center text-center p-6 font-sans">
    
    <div class="max-w-2xl w-full bg-white p-8 md:p-12 rounded-3xl shadow-sm border border-gray-100 flex flex-col items-center">
        
        <h1 class="text-8xl font-black text-gray-100 mb-2">404</h1>
        <h2 class="text-2xl font-bold text-secondary mb-2">¡Vaya! Te ha llevado la corriente.</h2>
        <p class="text-gray-500 mb-8">La página que buscas no existe, pero ya que estás aquí... ¡Ayúdanos a rescatar el inventario que cayó al agua!</p>

        <div class="relative w-full max-w-md bg-sky-50 rounded-2xl overflow-hidden border-2 border-sky-100 mb-8 h-[300px] shadow-inner cursor-crosshair" id="gameContainer">
            
            <div class="absolute top-4 left-4 bg-white/90 backdrop-blur text-secondary font-bold px-3 py-1 rounded-lg z-20 shadow-sm text-sm flex items-center gap-2 border border-gray-100">
                <i data-lucide="package" class="w-4 h-4 text-accent"></i>
                Rescatados: <span id="scoreDisplay" class="text-accent text-base">0</span>
            </div>

            <div id="startOverlay" class="absolute inset-0 bg-slate-900/80 z-30 flex flex-col items-center justify-center transition-opacity duration-300">
                <p class="text-white font-bold mb-4">Mueve el mouse para atrapar los items</p>
                <button id="playButton" class="bg-accent text-white px-8 py-3 rounded-xl font-bold hover:bg-pink-600 transition-colors shadow-lg scale-100 hover:scale-105 active:scale-95">
                    ¡Jugar Ahora!
                </button>
            </div>

            <div class="ocean">
                <div class="wave2"></div>
                <div class="wave"></div>
            </div>

            <canvas id="gameCanvas" class="w-full h-full"></canvas>
        </div>

        <a href="/index.html" class="bg-secondary text-white px-8 py-3 rounded-xl font-bold hover:bg-slate-800 transition-all inline-flex items-center gap-2 shadow-sm">
            <i data-lucide="home" class="w-5 h-5"></i>
            Volver a Tierra Firme
        </a>
    </div>

    <script>
        // Inicializar los iconos
        lucide.createIcons();

        // Envolvemos todo para asegurar que el HTML esté listo antes de correr el juego
        document.addEventListener('DOMContentLoaded', () => {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const container = document.getElementById('gameContainer');
            const scoreDisplay = document.getElementById('scoreDisplay');
            const startOverlay = document.getElementById('startOverlay');
            const playButton = document.getElementById('playButton');
            
            let score = 0;
            let gameLoop;
            let isPlaying = false;
            
            // Elementos que caerán
            const emojis = ['🧱', '🔧', '🪣', '📦', '🪜'];
            let items = [];
            
            // Propiedades de la balsa
            let player = {
                x: 150,
                y: 250,
                width: 80,
                height: 12,
                color: '#db2777' // Rosa Accent
            };

            // Ajustar el tamaño del canvas dinámicamente
            function resizeCanvas() {
                canvas.width = container.clientWidth;
                canvas.height = container.clientHeight;
                player.y = canvas.height - 40;
            }
            
            window.addEventListener('resize', resizeCanvas);
            // Doble confirmación del tamaño por seguridad
            setTimeout(resizeCanvas, 50);

            // Creador de objetos
            function spawnItem() {
                if(!isPlaying) return;
                
                items.push({
                    x: Math.random() * (canvas.width - 40) + 20,
                    y: -30,
                    speed: 2.5 + Math.random() * 2, // Velocidad de caída
                    emoji: emojis[Math.floor(Math.random() * emojis.length)],
                    size: 26
                });
                
                // Programar el siguiente
                setTimeout(spawnItem, 700 + Math.random() * 800);
            }

            // Bucle principal de dibujo
            function update() {
                if(!isPlaying) return;
                
                // Limpiar pantalla
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // Dibujar jugador (balsa)
                ctx.fillStyle = player.color;
                // Usamos fillRect en lugar de roundRect para asegurar máxima compatibilidad
                ctx.beginPath();
                if(ctx.roundRect) {
                    ctx.roundRect(player.x, player.y, player.width, player.height, 6);
                } else {
                    ctx.rect(player.x, player.y, player.width, player.height);
                }
                ctx.fill();

                // Dibujar y mover items
                for (let i = items.length - 1; i >= 0; i--) {
                    let item = items[i];
                    item.y += item.speed;

                    ctx.font = `${item.size}px Arial`;
                    ctx.textAlign = "center";
                    ctx.textBaseline = "middle";
                    ctx.fillText(item.emoji, item.x, item.y);

                    // Sistema de colisiones (Atrapar item)
                    if (item.y + (item.size/2) >= player.y && 
                        item.y - (item.size/2) <= player.y + player.height &&
                        item.x + (item.size/2) >= player.x && 
                        item.x - (item.size/2) <= player.x + player.width) {
                        
                        score++;
                        scoreDisplay.innerText = score;
                        items.splice(i, 1); // Lo atrapaste
                        
                        // Efecto visual al atrapar
                        player.color = '#be185d'; 
                        setTimeout(() => player.color = '#db2777', 150);
                    } 
                    // Si cae al agua
                    else if (item.y > canvas.height + 40) {
                        items.splice(i, 1);
                    }
                }

                // Llamar al siguiente frame
                gameLoop = requestAnimationFrame(update);
            }

            // Sistema de control (Escucha en la ventana entera para no perder el mouse)
            function movePlayer(e) {
                if(!isPlaying) return;
                const rect = canvas.getBoundingClientRect();
                
                let clientX;
                if (e.type.includes('mouse')) {
                    clientX = e.clientX;
                } else if (e.touches && e.touches.length > 0) {
                    clientX = e.touches[0].clientX;
                }

                if (clientX !== undefined) {
                    // Centrar la balsa en el cursor
                    let xPos = clientX - rect.left - (player.width / 2);
                    // Limitar a los bordes
                    player.x = Math.max(0, Math.min(xPos, canvas.width - player.width));
                }
            }

            window.addEventListener('mousemove', movePlayer);
            window.addEventListener('touchmove', movePlayer, {passive: true});

            // Botón de inicio
            playButton.addEventListener('click', () => {
                startOverlay.style.opacity = '0';
                setTimeout(() => {
                    startOverlay.style.display = 'none';
                    if (!isPlaying) {
                        resizeCanvas();
                        isPlaying = true;
                        score = 0;
                        scoreDisplay.innerText = score;
                        items = [];
                        spawnItem();
                        update();
                    }
                }, 300);
            });
        });
    </script>
</body>
</html>
