<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro - Inventario Quinta Ola</title>

  <!-- Fuente -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #1E3A8A;
      --primary-light: #3B82F6;
      --error: #EF4444;
      --success: #22C55E;
      --bg: #F9FAFB;
      --text: #111827;
      --border: #E5E7EB;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background-color: var(--bg);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      background: white;
      padding: 2rem;
      border-radius: 12px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
    }

    h2 {
      text-align: center;
      margin-bottom: 1.5rem;
      color: var(--text);
    }

    .form-group {
      margin-bottom: 1rem;
    }

    label {
      display: block;
      margin-bottom: 0.4rem;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 0.7rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 14px;
    }

    input:focus {
      outline: none;
      border-color: var(--primary);
    }

    .error {
      font-size: 12px;
      color: var(--error);
      display: none;
    }

    .info {
      font-size: 13px;
      color: var(--text);
      margin-top: 0.5rem;
    }

    button {
      width: 100%;
      padding: 0.8rem;
      background-color: var(--primary);
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 1rem;
    }

    button:hover {
      background-color: var(--primary-light);
    }

    .login-link {
      text-align: center;
      margin-top: 1rem;
      font-size: 14px;
    }

    .login-link a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 500;
    }

    .success-message {
      display: none;
      color: var(--success);
      font-size: 14px;
      text-align: center;
      margin-top: 1rem;
    }

  </style>
</head>
<body>

  <div class="container">
    <h2>Crear Cuenta</h2>

    <form id="registerForm">

      <div class="form-group">
        <label for="name">Nombres</label>
        <input type="text" id="name" placeholder="Tus nombres">
        <div class="error" id="nameError">Este campo es obligatorio</div>
      </div>

      <div class="form-group">
        <label for="dni">DNI</label>
        <input type="text" id="dni" placeholder="8 dígitos">
        <div class="error" id="dniError">Ingrese un DNI válido (8 dígitos)</div>
      </div>

      <div class="form-group">
        <label for="email">Correo</label>
        <input type="email" id="email" placeholder="ejemplo@correo.com">
        <div class="error" id="emailError">Ingrese un correo válido</div>
      </div>

      <button type="submit">Registrarse</button>

      <p class="info">
        Tu cuenta deberá ser aprobada por un Administrador.
      </p>

      <div class="success-message" id="successMessage">
        Registro exitoso. Redirigiendo...
      </div>

      <div class="login-link">
        ¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a>
      </div>

    </form>
  </div>

  <script>
    const form = document.getElementById('registerForm');

    form.addEventListener('submit', function(e) {
      e.preventDefault();

      let name = document.getElementById('name');
      let dni = document.getElementById('dni');
      let email = document.getElementById('email');

      let nameError = document.getElementById('nameError');
      let dniError = document.getElementById('dniError');
      let emailError = document.getElementById('emailError');
      let successMessage = document.getElementById('successMessage');

      let valid = true;

      // Nombre
      if (name.value.trim() === "") {
        nameError.style.display = "block";
        valid = false;
      } else {
        nameError.style.display = "none";
      }

      // DNI (8 dígitos)
      if (!/^[0-9]{8}$/.test(dni.value)) {
        dniError.style.display = "block";
        valid = false;
      } else {
        dniError.style.display = "none";
      }

      // Email
      if (email.value.trim() === "") {
        emailError.style.display = "block";
        valid = false;
      } else {
        emailError.style.display = "none";
      }

      // Si todo está bien
      if (valid) {
        successMessage.style.display = "block";

        setTimeout(() => {
          window.location.href = "login.html";
        }, 2000);
      }
    });
  </script>

</body>
</html>
