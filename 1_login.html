<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login - Inventario Quinta Ola</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <div class="login-wrapper">

    <!-- IMAGEN -->
    <div class="login-image">
      <div class="login-image-content">
        <h2>Bienvenida</h2>
        <p>Gestiona solicitudes, inventario y coordinación de manera eficiente.</p>
      </div>
    </div>

    <!-- FORMULARIO -->
    <div class="login-form">
      <h2>Iniciar Sesión</h2>

      <form id="loginForm">

        <div class="form-group">
          <label>Correo</label>
          <input type="email" id="email" placeholder="ejemplo@correo.com">
          <div class="error" id="emailError">Campo obligatorio</div>
        </div>

        <div class="form-group">
          <label>Contraseña</label>
          <input type="password" id="password" placeholder="********">
          <div class="error" id="passwordError">Campo obligatorio</div>
        </div>

        <button type="submit" class="btn-primary">Ingresar</button>

        <div class="link">
          ¿No tienes cuenta? <a href="registro.html">Regístrate aquí</a>
        </div>

      </form>
    </div>

  </div>

  <script>
    const form = document.getElementById('loginForm');

    form.addEventListener('submit', function(e) {
      e.preventDefault();

      let email = document.getElementById('email');
      let password = document.getElementById('password');

      let emailError = document.getElementById('emailError');
      let passwordError = document.getElementById('passwordError');

      let valid = true;

      if (email.value.trim() === "") {
        emailError.style.display = "block";
        valid = false;
      } else {
        emailError.style.display = "none";
      }

      if (password.value.trim() === "") {
        passwordError.style.display = "block";
        valid = false;
      } else {
        passwordError.style.display = "none";
      }

      if (valid) {
        window.location.href = "catalogo.html";
      }
    });
  </script>

</body>
</html>
